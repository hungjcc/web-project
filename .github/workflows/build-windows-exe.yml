name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas xlrd openpyxl pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --name xls_to_xlsx_converter video-music/convert_xls_to_xlsx.py

      - name: Prepare release ZIP (EXE + README)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force | Out-Null
          Copy-Item dist/xls_to_xlsx_converter.exe package/
          Copy-Item video-music/README.md package/README.md
          Compress-Archive -Path package/* -DestinationPath dist/xls_to_xlsx_converter_windows.zip -Force

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: xls-to-xlsx-release-assets
          path: |
            dist/xls_to_xlsx_converter.exe
            dist/xls_to_xlsx_converter_windows.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-exe
    runs-on: ubuntu-latest

    steps:
      - name: Validate semantic version tag (vX.Y.Z)
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag ${GITHUB_REF_NAME} is invalid. Expected format: vX.Y.Z"
            exit 1
          fi

      - name: Download release assets artifact
        uses: actions/download-artifact@v4
        with:
          name: xls-to-xlsx-release-assets
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/xls_to_xlsx_converter.exe
            release-assets/xls_to_xlsx_converter_windows.zip
